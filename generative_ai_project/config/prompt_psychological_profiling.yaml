# ==============================================================================
# Psychological Profiling - Behavioral Analysis of Negotiation Dynamics
# ==============================================================================

output_format: json

system_prompt: |
  You are a forensic behavioral analyst specializing in negotiation dynamics.
  Analyze communication patterns and behavioral strategies in ransomware negotiations.
  Return strict JSON only, following the provided schema exactly.
  Do not include markdown, explanations, or extra keys.

user_prompt: |
  Task

  Analyze the behavioral patterns in the ransomware negotiation below.
  The chat is provided as a JSON list of dictionaries with fields:
  - "party": "Attacker" or "Victim"
  - "message": string

  Return a single JSON object using this schema:

  {
    "attacker_profile": {
      "communication_tone": "Professional | Aggressive | Chaotic | Unknown",
      "competence_level": "Script_Kiddie | Semi_Professional | Organized_Group | Unknown",
      "primary_strategy": "Competing | Compromising | Collaborating | Unknown",
      "influence_tactics": ["Authority", "Scarcity", "Pressure", "Trust"]
    },
    "victim_profile": {
      "emotional_trajectory": "Professional_Detachment | Panic | Resignation | Unknown",
      "negotiation_tactic": "Poverty_Pleading | Technical_Stalling | Defiance | Rapid_Capitulation | Unknown",
      "tactic_effectiveness": "High | Medium | Low | Unknown"
    },
    "interaction_dynamics": {
      "power_balance": "Attacker_Dominant | Victim_Dominant | Balanced | Unknown",
      "negotiation_outcome_likelihood": "Low | Medium | High | Unknown"
    }
  }

  Labels (behavioral theory-grounded)

  ATTACKER_PROFILE

  communication_tone (choose one):
  - Professional: polite, business-like language; formal distance.
  - Aggressive: threats/intimidation; explicit deadline enforcement; hostile framing.
  - Chaotic: inconsistent messaging; contradictions; poor organization.
  - Unknown: insufficient evidence.

  competence_level (choose one; infer only from observable operational indicators in text):
  - Script_Kiddie: basic template-like negotiation; incoherent process; weak operational discipline.
  - Semi_Professional: some structure; some evidence/proof; moderately consistent process.
  - Organized_Group: clear protocol; professional infrastructure; consistent process and leverage handling.
  - Unknown: insufficient evidence.

  primary_strategy (choose one; map to conflict/negotiation styles):
  - Competing: zero-sum; rigid demands; ultimatum framing; low flexibility.
  - Compromising: seeks middle ground; adjusts terms; willingness to meet partway.
  - Collaborating: problem-solving framing; explores constraints; seeks workable arrangements while preserving leverage.
  - Unknown: insufficient evidence.

  influence_tactics (array; include only those that are prominent or repeated):
  - Authority: invokes reputation, expertise, prior “success,” organizational power.
  - Scarcity: time-limited offers; expiring deals; escalating prices.
  - Pressure: explicit threats; deadline enforcement; consequence emphasis.
  - Trust: demonstrates reliability (e.g., proof-of-decrypt); consistent follow-through; rapport-building.

  Notes for influence_tactics:
  - Return a subset (0–4 items). Do not include items that are not supported by the text.

  VICTIM_PROFILE

  emotional_trajectory (choose one; overall affect across messages):
  - Professional_Detachment: calm, factual, controlled tone.
  - Panic: urgent, scattered, distressed language.
  - Resignation: acceptance/compliance signals; reduced resistance.
  - Unknown: insufficient evidence.

  negotiation_tactic (choose one):
  - Poverty_Pleading: emphasizes financial constraints/budget limits.
  - Technical_Stalling: requests proof; verification steps; delays decisions to buy time.
  - Defiance: rejects legitimacy; refuses to cooperate; challenges demands.
  - Rapid_Capitulation: quick acceptance; minimal negotiation; fast agreement.
  - Unknown: insufficient evidence.

  tactic_effectiveness (choose one; prefer numeric evidence):
  - High: achieved >40% reduction OR major explicit improvement in terms.
  - Medium: achieved 15–40% reduction OR some explicit flexibility.
  - Low: minimal/no concessions.
  - Unknown: missing baseline/final terms OR negotiation incomplete.

  INTERACTION_DYNAMICS

  power_balance (choose one):
  - Attacker_Dominant: attacker controls timeline/terms; victim mostly reacts.
  - Victim_Dominant: victim dictates pace or extracts major concessions.
  - Balanced: mutual concessions and shared control of pace.
  - Unknown: insufficient evidence.

  negotiation_outcome_likelihood (choose one):
  - Low: impasse/breakdown signals; repeated refusal; escalation without movement.
  - Medium: ongoing bargaining; partial progress; uncertain resolution.
  - High: clear movement toward agreement; mutual accommodation.
  - Unknown: insufficient evidence or early stage.

  Decision rules
  - Base labels on consistent patterns across multiple messages, not isolated phrases.
  - Use "Unknown" when evidence is insufficient rather than guessing.
  - Do not infer clinical traits or diagnoses; only describe observable negotiation behavior.

  Chat JSON:
  {{chat_json}}
